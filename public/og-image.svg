<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Grid Pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    </pattern>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Main Content -->
  <g transform="translate(100, 0)">
    <!-- Name -->
    <text x="0" y="200" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800" fill="url(#textGradient)">
      Ahmet Mert Şengöl
    </text>
    
    <!-- Title -->
    <text x="0" y="280" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="500" fill="#e2e8f0">
      Software Engineering Student
    </text>
    
    <!-- University -->
    <text x="0" y="330" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="400" fill="#94a3b8">
      Fırat Üniversitesi
    </text>
    
    <!-- Skills -->
    <g transform="translate(0, 400)">
      <rect x="0" y="0" width="180" height="40" rx="20" fill="rgba(99, 102, 241, 0.2)" stroke="#6366f1" stroke-width="1"/>
      <text x="90" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#6366f1">
        AI/ML
      </text>
      
      <rect x="200" y="0" width="220" height="40" rx="20" fill="rgba(139, 92, 246, 0.2)" stroke="#8b5cf6" stroke-width="1"/>
      <text x="310" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#8b5cf6">
        Computer Vision
      </text>
      
      <rect x="440" y="0" width="160" height="40" rx="20" fill="rgba(236, 72, 153, 0.2)" stroke="#ec4899" stroke-width="1"/>
      <text x="520" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#ec4899">
        Algorithms
      </text>
    </g>
  </g>
  
  <!-- Logo -->
  <g transform="translate(900, 100)">
    <rect width="200" height="200" rx="30" fill="url(#textGradient)" opacity="0.1"/>
    <rect width="200" height="200" rx="30" fill="none" stroke="url(#textGradient)" stroke-width="2"/>
    <text x="100" y="130" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="url(#textGradient)">
      AMS
    </text>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="1000" cy="500" r="80" fill="none" stroke="rgba(99, 102, 241, 0.3)" stroke-width="1"/>
  <circle cx="1000" cy="500" r="60" fill="none" stroke="rgba(139, 92, 246, 0.4)" stroke-width="1"/>
  <circle cx="1000" cy="500" r="40" fill="none" stroke="rgba(236, 72, 153, 0.5)" stroke-width="1"/>
</svg> 